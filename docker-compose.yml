services:
  trading-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bybit-trading-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=UTC
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    # Uncomment to expose a healthcheck port if needed:
    # ports:
    #   - "8080:8080"
